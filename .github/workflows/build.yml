name: Build Sena Repo Client

permissions:
  contents: write
  packages: write

on:
  push:
    branches: [main, master, dev]
  pull_request:
    branches: [main, master, dev]
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (留空则从 pubspec.yaml 读取)'
        required: false
        default: ''
        type: string
      publish:
        description: '发布到 GitHub Release'
        required: true
        default: 'none'
        type: choice
        options:
          - none
          - pre-release
          - release

defaults:
  run:
    working-directory: client

jobs:
  # ── Android APK ──────────────────────────────────
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        run: |
          V="${{ inputs.version }}"
          if [ -z "$V" ]; then V=$(grep "^version:" pubspec.yaml | head -1 | sed 's/version: *//'); fi
          echo "VERSION=$V" >> "$GITHUB_ENV"

      - uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.29"
          channel: "stable"

      - name: Setup NDK
        run: |
          # Remove corrupted NDK install + SDK download cache
          rm -rf "$ANDROID_HOME/ndk/27.0.12077973"
          rm -rf "$ANDROID_HOME/.temp" 2>/dev/null || true
          rm -rf "$ANDROID_HOME/.cache" 2>/dev/null || true
          # Pre-install NDK via sdkmanager (more reliable than AGP auto-download)
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --install "ndk;27.0.12077973" 2>&1 || \
          yes | "$ANDROID_HOME/tools/bin/sdkmanager" --install "ndk;27.0.12077973" 2>&1 || true
          # Tell AGP where to find NDK so it skips auto-download
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/27.0.12077973" >> "$GITHUB_ENV"

      - name: Copy 7z binary (Android ARM64)
        run: |
          mkdir -p assets/binaries
          cp ../7z/Android/7zz assets/binaries/7zz
          chmod +x assets/binaries/7zz

      - name: Enable Android + generate platform files
        run: |
          flutter config --enable-android
          flutter create . --project-name sena_repo --org senarepo

      - name: Install dependencies
        run: flutter pub get

      - name: Generate app icons
        run: dart run flutter_launcher_icons

      - name: Build APK (release)
        run: flutter build apk --release

      - name: Rename APK
        run: |
          mkdir -p dist
          mv build/app/outputs/flutter-apk/app-release.apk \
             "dist/Sena-Repo_Android_v${VERSION}.apk"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Sena-Repo_Android
          path: client/dist/Sena-Repo_Android_*.apk

  # ── Windows EXE ──────────────────────────────────
  build-windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        shell: pwsh
        run: |
          $V = "${{ inputs.version }}"
          if (-not $V) { $V = ((Select-String -Path pubspec.yaml -Pattern '^version:').Line -replace 'version: *','').Trim() }
          echo "VERSION=$V" | Out-File -FilePath $env:GITHUB_ENV -Append

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.29"
          channel: "stable"

      - name: Copy 7z binary (Windows)
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force assets/binaries | Out-Null
          Copy-Item "../7z/Windows/7z.exe" assets/binaries/7z.exe
          Copy-Item "../7z/Windows/7z.dll" assets/binaries/7z.dll
          Copy-Item "../7z/Windows/License.txt" assets/binaries/LICENSE-7z.txt
          Copy-Item "../7z/Windows/readme.txt" assets/binaries/README-7z.txt

      - name: Enable Windows + generate platform files
        run: |
          flutter config --enable-windows-desktop
          Remove-Item -Recurse -Force windows/ -ErrorAction SilentlyContinue
          flutter create . --project-name sena_repo --org senarepo
          # Restore packaging config deleted by flutter create
          Copy-Item -Recurse -Force windows_assets\packaging windows\packaging

      - name: Install dependencies
        run: flutter pub get

      - name: Generate app icons
        run: dart run flutter_launcher_icons

      - name: Build Windows
        run: flutter build windows --release

      - name: Bundle Python + VDF script
        shell: pwsh
        run: |
          $releaseDir = "build/windows/x64/runner/Release"
          Copy-Item -Path "python" -Destination "$releaseDir/python" -Recurse
          Copy-Item -Path "../server/add_steam_game.py" -Destination "$releaseDir/add_steam_game.py"
          Copy-Item -Path "../server/vdf" -Destination "$releaseDir/vdf" -Recurse

      - name: Setup fastforge + Inno Setup
        shell: pwsh
        run: |
          dart pub global activate fastforge
          Write-Host "fastforge: $((Get-Command fastforge -ErrorAction SilentlyContinue).Source)"
          choco install innosetup -y --no-progress

      - name: Install Chinese language for Inno Setup
        shell: pwsh
        run: |
          Copy-Item "windows_assets\ChineseSimplified.isl" "windows\packaging\exe\ChineseSimplified.isl"
          Copy-Item "windows_assets\ChineseSimplified.isl" "C:\Program Files (x86)\Inno Setup 6\Languages\ChineseSimplified.isl"

      - name: Verify packaging files
        shell: pwsh
        run: Get-ChildItem -Recurse windows\packaging

      - name: Build installer
        run: |
          fastforge package --platform windows --targets exe

      - name: Flatten installer artifact
        shell: pwsh
        run: |
          $setupExe = Get-ChildItem -Recurse dist -Filter "*.exe" | Where-Object { $_.Name -like "*setup*" -or $_.Name -like "*Setup*" } | Select-Object -First 1
          if ($setupExe) {
            Move-Item $setupExe.FullName "dist/Sena-Repo_Windows_v${env:VERSION}_Setup.exe"
            Remove-Item -Recurse -Force dist/0.* -ErrorAction SilentlyContinue
          } else {
            Write-Host "No setup exe found! Listing dist:"
            Get-ChildItem -Recurse dist
          }

      - name: Package Windows (portable zip)
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $pkg="Sena-Repo_Windows_v${env:VERSION}"
          New-Item -ItemType Directory -Force -Path $pkg | Out-Null
          Copy-Item -Path build/windows/x64/runner/Release/* -Destination $pkg/ -Recurse
          Compress-Archive -Path $pkg -DestinationPath "dist/$pkg.zip"

      - name: Upload Windows Portable
        uses: actions/upload-artifact@v4
        with:
          name: Sena-Repo_Windows_Portable
          path: client/dist/Sena-Repo_Windows_*.zip

      - name: Upload Windows Installer
        uses: actions/upload-artifact@v4
        with:
          name: Sena-Repo_Windows_Installer
          path: client/dist/**/*.exe

  # ── Linux (RPM + Arch + AppImage) ─────────────────
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        run: |
          V="${{ inputs.version }}"
          if [ -z "$V" ]; then V=$(grep "^version:" pubspec.yaml | head -1 | sed 's/version: *//'); fi
          echo "VERSION=$V" >> "$GITHUB_ENV"

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.29"
          channel: "stable"

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev rpm zstd file imagemagick \
            libayatana-appindicator3-dev p7zip-full

      # Linux uses system 7z from p7zip-full (already installed above)

      - name: Copy 7z binary (Linux)
        run: |
          mkdir -p assets/binaries
          tar -xf ../7z/Linux/7z2601-linux-x64.tar.xz -C assets/binaries 7zz

      - name: Enable Linux + generate platform files
        run: |
          flutter config --enable-linux-desktop
          flutter create . --project-name sena_repo --org senarepo
          # Remove template Android files that conflict with custom ones under com/github/senarepo
          rm -rf android/app/src/main/kotlin/senarepo
          # Enable touch events for Flutter Linux
          for f in linux/runner/my_application.cc linux/my_application.cc; do
            if [ -f "$f" ]; then
              sed -i '/gtk_init/i\  g_setenv("GTK_TEST_TOUCHSCREEN", "1", TRUE);' "$f" || true
              sed -i '/gtk_init/i\  g_setenv("GDK_TOUCH", "1", TRUE);' "$f" || true
            fi
          done

      - name: Install dependencies
        run: flutter pub get

      - name: Generate app icons
        run: dart run flutter_launcher_icons

      - name: Build Linux
        run: flutter build linux --release

      # ── Prepare package directory ──
      - name: Setup packaging
        run: |
          BUNDLE=build/linux/x64/release/bundle
          mkdir -p dist

          # Desktop file + icon
          mkdir -p "$BUNDLE/usr/share/applications"
          cat > "$BUNDLE/usr/share/applications/sena-repo.desktop" << 'DESKTOP'
          [Desktop Entry]
          Name=Sena Repo
          Comment=GalGame Private Library Manager
          Exec=sena_repo
          Icon=sena-repo
          Type=Application
          Categories=Game;Utility;
          DESKTOP

      # ── RPM (Fedora/RHEL) ──
      - name: Build RPM
        run: |
          BUNDLE=build/linux/x64/release/bundle
          RELEASE="1"
          ARCH="x86_64"

          # Create RPM build tree
          mkdir -p ~/rpmbuild/{BUILD,RPMS,SOURCES,SPECS,SRPMS}

          # Create spec
          cat > ~/rpmbuild/SPECS/sena-repo.spec << SPEC
          Name:           sena-repo
          Version:        ${VERSION}
          Release:        ${RELEASE}%{?dist}
          Summary:        GalGame Private Library Manager
          License:        GPL-3.0
          URL:            https://github.com/404-GCross/Sena-Repo
          BuildArch:      ${ARCH}

          %description
          Sena Repo is a cross-platform GalGame/Visual Novel private library manager.

          %install
          mkdir -p %{buildroot}/opt/sena-repo
          cp -r ${GITHUB_WORKSPACE}/client/build/linux/x64/release/bundle/* %{buildroot}/opt/sena-repo/
          mkdir -p %{buildroot}/usr/bin
          ln -s /opt/sena-repo/sena_repo %{buildroot}/usr/bin/sena-repo
          mkdir -p %{buildroot}/usr/share/applications
          cp %{buildroot}/opt/sena-repo/usr/share/applications/sena-repo.desktop %{buildroot}/usr/share/applications/

          %files
          /opt/sena-repo/
          /usr/bin/sena-repo
          /usr/share/applications/sena-repo.desktop

          %changelog
          * $(date +"%a %b %d %Y") Sena Repo Team - ${VERSION}-${RELEASE}
          - Initial release
          SPEC

          rpmbuild -bb --target ${ARCH} ~/rpmbuild/SPECS/sena-repo.spec
          cp ~/rpmbuild/RPMS/${ARCH}/sena-repo-*.rpm "dist/Sena-Repo_Fedora_v${VERSION}.rpm"

      # ── Arch Linux (pacman) ──
      - name: Build Arch package
        run: |
          BUNDLE=build/linux/x64/release/bundle
          PKG="sena-repo-${VERSION}-1-x86_64"

          mkdir -p "$PKG/opt/sena-repo"
          cp -r "$BUNDLE"/* "$PKG/opt/sena-repo/"
          mkdir -p "$PKG/usr/bin"
          ln -s /opt/sena-repo/sena_repo "$PKG/usr/bin/sena-repo"
          mkdir -p "$PKG/usr/share/applications"
          cp "$BUNDLE/usr/share/applications/sena-repo.desktop" "$PKG/usr/share/applications/"

          # .PKGINFO metadata
          cat > "$PKG/.PKGINFO" << PKGINFO
          pkgname = sena-repo
          pkgbase = sena-repo
          pkgver = ${VERSION}-1
          pkgdesc = GalGame Private Library Manager
          url = https://github.com/404-GCross/Sena-Repo
          builddate = $(date -u +%s)
          packager = Sena Repo CI
          size = $(du -sb "$PKG" | cut -f1)
          arch = x86_64
          license = GPL-3.0
          PKGINFO

          # .MTREE (required by pacman)
          cd "$PKG"
          LANG=C bsdtar -czf .MTREE --format=mtree \
            --options='!all,use-set,type,uid,gid,mode,time,size,md5,sha256,link' \
            opt usr .PKGINFO 2>/dev/null || true
          cd ..

          # Package as .pkg.tar.zst
          tar -c -I 'zstd -19' -f "dist/Sena-Repo_Arch_v${VERSION}.pkg.tar.zst" -C "$PKG" .
          rm -rf "$PKG"

      # ── AppImage (universal) ──
      - name: Build AppImage
        run: |
          BUNDLE=build/linux/x64/release/bundle

          APPDIR="SenaRepo.AppDir"
          mkdir -p "$APPDIR"
          cp -r "$BUNDLE"/* "$APPDIR/"

          # AppRun
          cat > "$APPDIR/AppRun" << 'APPRUN'
          #!/bin/bash
          HERE="$(dirname "$(readlink -f "$0")")"
          exec "$HERE/sena_repo" "$@"
          APPRUN
          chmod +x "$APPDIR/AppRun"

          # Desktop file
          cp "$BUNDLE/usr/share/applications/sena-repo.desktop" "$APPDIR/"

          # Icon (placeholder)
          mkdir -p "$APPDIR/usr/share/icons/hicolor/256x256/apps"
          convert -size 256x256 xc:purple -fill white -font Helvetica \
            -pointsize 120 -gravity center -annotate 0 "S" \
            "$APPDIR/usr/share/icons/hicolor/256x256/apps/sena-repo.png" 2>/dev/null || \
          convert -size 256x256 xc:purple "$APPDIR/usr/share/icons/hicolor/256x256/apps/sena-repo.png"
          ln -sf usr/share/icons/hicolor/256x256/apps/sena-repo.png "$APPDIR/.DirIcon"
          cp "$APPDIR/usr/share/icons/hicolor/256x256/apps/sena-repo.png" "$APPDIR/sena-repo.png"

          # Build AppImage
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage
          export APPIMAGE_EXTRACT_AND_RUN=1
          ARCH=x86_64 ./appimagetool-x86_64.AppImage "$APPDIR" "dist/Sena-Repo_AppImage_v${VERSION}-x86_64.AppImage"
          rm -rf "$APPDIR"

      # ── Upload artifacts ──
      - name: Upload RPM
        uses: actions/upload-artifact@v4
        with:
          name: Sena-Repo_Fedora
          path: client/dist/Sena-Repo_Fedora_*.rpm

      # ── DEB (Debian/Ubuntu) ──
      - name: Build DEB
        run: |
          BUNDLE=build/linux/x64/release/bundle
          DEB="sena-repo_${VERSION}_amd64"
          mkdir -p "$DEB/DEBIAN" "$DEB/opt/sena-repo"
          cp -r "$BUNDLE"/* "$DEB/opt/sena-repo/"
          mkdir -p "$DEB/usr/bin" "$DEB/usr/share/applications"
          ln -s /opt/sena-repo/sena_repo "$DEB/usr/bin/sena-repo"
          cp "$BUNDLE/usr/share/applications/sena-repo.desktop" "$DEB/usr/share/applications/"
          cat > "$DEB/DEBIAN/control" << CONTROL
          Package: sena-repo
          Version: ${VERSION}
          Section: games
          Priority: optional
          Architecture: amd64
          Maintainer: Sena Repo Team
          Description: GalGame Private Library Manager
           Sena Repo is a cross-platform GalGame/Visual Novel
           private library manager with multi-source metadata scraping.
          CONTROL
          dpkg-deb --build "$DEB" "dist/Sena-Repo_Debian_v${VERSION}.deb"
          rm -rf "$DEB"

      - name: Upload Debian
        uses: actions/upload-artifact@v4
        with:
          name: Sena-Repo_Debian
          path: client/dist/Sena-Repo_Debian_*.deb

      - name: Upload Arch
        uses: actions/upload-artifact@v4
        with:
          name: Sena-Repo_Arch
          path: client/dist/Sena-Repo_Arch_*.pkg.tar.zst

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: Sena-Repo_AppImage
          path: client/dist/Sena-Repo_AppImage_*.AppImage

  # ── Publish to GitHub Release ──────────────────
  publish:
    needs: [build-android, build-windows, build-linux, build-server]
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.publish != 'none' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        run: |
          V=${{ inputs.version }}
          if [ -z "$V" ]; then
            V=$(grep "^version:" client/pubspec.yaml | head -1 | sed 's/version: *//')
          fi
          echo "version=$V" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release

      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          gh release create "v${{ steps.ver.outputs.version }}" \
            ${{ inputs.publish == 'pre-release' && '--prerelease' || '' }} \
            --title "v${{ steps.ver.outputs.version }}" \
            --notes "## 变更" \
            release/**/*
          body: |
            ## 变更
            版本 ${{ steps.ver.outputs.version }}

  # ── Docker Server Image ──────────────────────────
  build-server:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        run: |
          V="${{ inputs.version }}"
          if [ -z "$V" ]; then V=$(grep "^version:" client/pubspec.yaml | head -1 | sed 's/version: *//'); fi
          echo "VERSION=$V" >> "$GITHUB_ENV"

      - name: Build Docker image
        run: docker build -t sena-repo:latest server/

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push to GHCR
        run: |
          docker tag sena-repo:latest ghcr.io/404-gcross/sena-repo:latest
          docker tag sena-repo:latest ghcr.io/404-gcross/sena-repo:v${VERSION}
          docker push ghcr.io/404-gcross/sena-repo:latest
          docker push ghcr.io/404-gcross/sena-repo:v${VERSION}

      - name: Save Docker image (tarball)
        run: |
          docker save sena-repo:latest | gzip > "Sena-Repo_Server_v${VERSION}.tar.gz"

      - name: Upload Server Image
        uses: actions/upload-artifact@v4
        with:
          name: Sena-Repo_Server
          path: Sena-Repo_Server_*.tar.gz

name: 编译并发布Release

env:
  VERSION: "0.1.0"

on:
  workflow_dispatch:

defaults:
  run:
    working-directory: client

jobs:
  # ── Android APK ──────────────────────────────────
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.29"
          channel: "stable"

      - name: Setup NDK
        run: |
          rm -rf "$ANDROID_HOME/ndk/27.0.12077973"
          rm -rf "$ANDROID_HOME/.temp" 2>/dev/null || true
          rm -rf "$ANDROID_HOME/.cache" 2>/dev/null || true
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --install "ndk;27.0.12077973" 2>&1 || \
          yes | "$ANDROID_HOME/tools/bin/sdkmanager" --install "ndk;27.0.12077973" 2>&1 || true
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/27.0.12077973" >> "$GITHUB_ENV"

      - name: Copy 7z binary (Android ARM64)
        run: |
          mkdir -p assets/binaries
          cp ../7z/Android/7zz assets/binaries/7zz
          chmod +x assets/binaries/7zz

      - name: Enable Android + generate platform files
        run: |
          flutter config --enable-android
          flutter create . --project-name sena_repo --org senarepo

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK (release)
        run: flutter build apk --release

      - name: Rename APK
        run: |
          mkdir -p dist
          mv build/app/outputs/flutter-apk/app-release.apk \
             "dist/Sena-Repo_Android_v${VERSION}.apk"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Sena-Repo_Android
          path: client/dist/Sena-Repo_Android_*.apk

  # ── Windows EXE ──────────────────────────────────
  build-windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.29"
          channel: "stable"

      - name: Copy 7z binary (Windows)
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force assets/binaries | Out-Null
          Copy-Item "../7z/Windows/7z.exe" assets/binaries/7z.exe
          Copy-Item "../7z/Windows/7z.dll" assets/binaries/7z.dll
          Copy-Item "../7z/Windows/License.txt" assets/binaries/LICENSE-7z.txt
          Copy-Item "../7z/Windows/readme.txt" assets/binaries/README-7z.txt

      - name: Enable Windows + generate platform files
        run: |
          flutter config --enable-windows-desktop
          Remove-Item -Recurse -Force windows/ -ErrorAction SilentlyContinue
          flutter create . --project-name sena_repo --org senarepo

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows
        run: flutter build windows --release

      - name: Package Windows
        shell: pwsh
        run: |
          mkdir -p dist
          $pkg="Sena-Repo_Windows_v${env:VERSION}"
          New-Item -ItemType Directory -Path $pkg | Out-Null
          Copy-Item -Path build/windows/x64/runner/Release/* -Destination $pkg/ -Recurse
          Compress-Archive -Path $pkg -DestinationPath "dist/$pkg.zip"

      - name: Upload Windows
        uses: actions/upload-artifact@v4
        with:
          name: Sena-Repo_Windows
          path: client/dist/Sena-Repo_Windows_*.zip

  # ── Linux ────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.29"
          channel: "stable"

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev rpm zstd file imagemagick \
            libayatana-appindicator3-dev p7zip-full

      - name: Copy 7z binary (Linux)
        run: |
          mkdir -p assets/binaries
          tar -xf ../7z/Linux/7z2601-linux-x64.tar.xz -C assets/binaries 7zz

      - name: Enable Linux + generate platform files
        run: |
          flutter config --enable-linux-desktop
          flutter create . --project-name sena_repo --org senarepo
          rm -rf android/app/src/main/kotlin/senarepo
          for f in linux/runner/my_application.cc linux/my_application.cc; do
            if [ -f "$f" ]; then
              sed -i '/gtk_init/i\  g_setenv("GTK_TEST_TOUCHSCREEN", "1", TRUE);' "$f" || true
              sed -i '/gtk_init/i\  g_setenv("GDK_TOUCH", "1", TRUE);' "$f" || true
            fi
          done

      - name: Install dependencies
        run: flutter pub get

      - name: Build Linux
        run: flutter build linux --release

      - name: Setup packaging
        run: |
          BUNDLE=build/linux/x64/release/bundle
          mkdir -p dist
          mkdir -p "$BUNDLE/usr/share/applications"
          cat > "$BUNDLE/usr/share/applications/sena-repo.desktop" << 'DESKTOP'
          [Desktop Entry]
          Name=Sena Repo
          Comment=GalGame Private Library Manager
          Exec=sena_repo
          Icon=sena-repo
          Type=Application
          Categories=Game;Utility;
          DESKTOP

      - name: Build AppImage
        run: |
          BUNDLE=build/linux/x64/release/bundle
          APPDIR="SenaRepo.AppDir"
          mkdir -p "$APPDIR"
          cp -r "$BUNDLE"/* "$APPDIR/"
          cat > "$APPDIR/AppRun" << 'APPRUN'
          #!/bin/bash
          HERE="$(dirname "$(readlink -f "$0")")"
          exec "$HERE/sena_repo" "$@"
          APPRUN
          chmod +x "$APPDIR/AppRun"
          cp "$BUNDLE/usr/share/applications/sena-repo.desktop" "$APPDIR/"
          mkdir -p "$APPDIR/usr/share/icons/hicolor/256x256/apps"
          convert -size 256x256 xc:purple -fill white -font Helvetica \
            -pointsize 120 -gravity center -annotate 0 "S" \
            "$APPDIR/usr/share/icons/hicolor/256x256/apps/sena-repo.png" 2>/dev/null || \
          convert -size 256x256 xc:purple "$APPDIR/usr/share/icons/hicolor/256x256/apps/sena-repo.png"
          ln -sf usr/share/icons/hicolor/256x256/apps/sena-repo.png "$APPDIR/.DirIcon"
          cp "$APPDIR/usr/share/icons/hicolor/256x256/apps/sena-repo.png" "$APPDIR/sena-repo.png"
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage
          export APPIMAGE_EXTRACT_AND_RUN=1
          ARCH=x86_64 ./appimagetool-x86_64.AppImage "$APPDIR" "dist/Sena-Repo_AppImage_v${VERSION}-x86_64.AppImage"
          rm -rf "$APPDIR"

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: Sena-Repo_AppImage
          path: client/dist/Sena-Repo_AppImage_*.AppImage

  # ── Create Release ──
  create-release:
    needs: [build-android, build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        run: |
          gh release create "v${VERSION}" \
            --title "Release v${VERSION}" \
            --notes "正式发布版本" \
            Sena-Repo_Android/* \
            Sena-Repo_Windows/* \
            Sena-Repo_AppImage/*
        env:
          GH_TOKEN: ${{ github.token }}

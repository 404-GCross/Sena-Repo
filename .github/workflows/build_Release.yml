name: 编译并发布 Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本号（留空则从 pubspec.yaml 读取）'
        required: false
        default: ''
        type: string
      notes_mode:
        description: '发布说明模式'
        required: false
        default: 'both'
        type: choice
        options:
          - both
          - custom
          - auto
      custom_notes:
        description: '自定义发布说明（可选）'
        required: false
        default: ''
        type: string


permissions:
  contents: write
  packages: write

defaults:
  run:
    working-directory: client

jobs:
  # ── Android APK ──────────────────────────────────
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Resolve version
        run: |
          V="${{ inputs.version }}"
          if [ -z "$V" ]; then V=$(grep "^version:" pubspec.yaml | head -1 | sed 's/version: *//'); fi
          echo "VERSION=$V" >> "$GITHUB_ENV"
      - name: Sync version into code
        run: |
          sed -i "s/versionName = \".*\"/versionName = \"${VERSION}\"/" android/app/build.gradle.kts
          sed -i "s/const appVersion = \".*\"/const appVersion = \"${VERSION}\"/" lib/utils/version.dart
          sed -i "s/^version: .*/version: ${VERSION}/" pubspec.yaml
      - uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.29"
          channel: "stable"
      - name: Setup NDK
        run: |
          rm -rf "$ANDROID_HOME/ndk/27.0.12077973"
          rm -rf "$ANDROID_HOME/.temp" 2>/dev/null || true
          rm -rf "$ANDROID_HOME/.cache" 2>/dev/null || true
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --install "ndk;27.0.12077973" 2>&1 || \
          yes | "$ANDROID_HOME/tools/bin/sdkmanager" --install "ndk;27.0.12077973" 2>&1 || true
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/27.0.12077973" >> "$GITHUB_ENV"
      - name: Copy 7z binary
        run: |
          mkdir -p assets/binaries
          cp ../7z/Android/7zz assets/binaries/7zz
          chmod +x assets/binaries/7zz
      - name: Enable Android
        run: |
          flutter config --enable-android
          flutter create . --project-name sena_repo --org senarepo
      - name: Install dependencies
        run: flutter pub get
      - name: Generate app icons
        run: dart run flutter_launcher_icons
      - name: Build APK
        run: flutter build apk --release
      - name: Rename APK
        run: |
          mkdir -p dist
          mv build/app/outputs/flutter-apk/app-release.apk "dist/Sena-Repo_Android_v${VERSION}.apk"
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Sena-Repo_Android
          path: client/dist/Sena-Repo_Android_*.apk

  # ── Windows EXE ──────────────────────────────────
  build-windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
      - name: Resolve version
        shell: pwsh
        run: |
          $V = "${{ inputs.version }}"
          if (-not $V) { $V = ((Select-String -Path pubspec.yaml -Pattern '^version:').Line -replace 'version: *','').Trim() }
          echo "VERSION=$V" | Out-File -FilePath $env:GITHUB_ENV -Append
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.29"
          channel: "stable"
      - name: Copy 7z binary
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force assets/binaries | Out-Null
          Copy-Item "../7z/Windows/7z.exe" assets/binaries/7z.exe
          Copy-Item "../7z/Windows/7z.dll" assets/binaries/7z.dll
          Copy-Item "../7z/Windows/License.txt" assets/binaries/LICENSE-7z.txt
          Copy-Item "../7z/Windows/readme.txt" assets/binaries/README-7z.txt
      - name: Sync version to source files
        shell: pwsh
        run: |
          $ver = $env:VERSION
          (Get-Content pubspec.yaml) -replace '^version: .+', "version: $ver" | Set-Content pubspec.yaml
          (Get-Content lib\utils\version.dart) -replace 'const appVersion = ".*"', "const appVersion = ""$ver""" | Set-Content lib\utils\version.dart
          Write-Host "Version set to $ver"
      - name: Enable Windows
        run: |
          flutter config --enable-windows-desktop
          Remove-Item -Recurse -Force windows/ -ErrorAction SilentlyContinue
          flutter create . --project-name sena_repo --org senarepo
          Copy-Item -Recurse -Force windows_assets\packaging windows\packaging
      - name: Install dependencies
        run: flutter pub get
      - name: Generate app icons
        run: dart run flutter_launcher_icons
      - name: Build Windows
        run: flutter build windows --release

      - name: Setup Inno Setup
        run: choco install innosetup -y --no-progress
      - name: Install Chinese language
        shell: pwsh
        run: Copy-Item "windows_assets\ChineseSimplified.isl" "C:\Program Files (x86)\Inno Setup 6\Languages\ChineseSimplified.isl"
      - name: Bundle Python + VDF
        shell: pwsh
        run: |
          $releaseDir = "build/windows/x64/runner/Release"
          Copy-Item -Path "python" -Destination "$releaseDir/python" -Recurse -ErrorAction Stop
          Copy-Item -Path "../server/add_steam_game.py" -Destination "$releaseDir/add_steam_game.py" -ErrorAction Stop
          Copy-Item -Path "../server/vdf" -Destination "$releaseDir/vdf" -Recurse -ErrorAction Stop

      - name: Build installer (ISCC)
        shell: pwsh
        run: |
          Write-Host "=== Release dir check before ISCC ==="
          Test-Path "build/windows/x64/runner/Release/python/python.exe" | ForEach-Object { "python.exe: $_" }
          Get-ChildItem build/windows/x64/runner/Release -Directory | Select-Object Name
          $ver = $env:VERSION
          $releaseDir = (Resolve-Path "build/windows/x64/runner/Release").Path
          $template = Get-Content "windows_assets/packaging/exe/inno_setup.iss" -Raw
          $iss = $template `
            -replace '\{\{APP_ID\}\}', 'a1b2c3d4-e5f6-7890-abcd-ef1234567890' `
            -replace '\{\{APP_VERSION\}\}', $ver `
            -replace '\{\{DISPLAY_NAME\}\}', 'Sena Repo' `
            -replace '\{\{PUBLISHER_NAME\}\}', 'Sena Repo' `
            -replace '\{\{PUBLISHER_URL\}\}', 'https://github.com/404-GCross/Sena-Repo' `
            -replace '\{\{INSTALL_DIR_NAME\}\}', '{autopf}\Sena Repo' `
            -replace '\{\{OUTPUT_BASE_FILENAME\}\}', "Sena-Repo_Windows_${ver}_Setup" `
            -replace '\{\{SETUP_ICON_FILE\}\}', (Resolve-Path "windows\runner\resources\app_icon.ico").Path `
            -replace '\{\{PRIVILEGES_REQUIRED\}\}', 'admin' `
            -replace '\{\{EXECUTABLE_NAME\}\}', 'sena_repo.exe' `
            -replace '\{\{SOURCE_DIR\}\}', $releaseDir `
            -replace '^OutputDir=\.', 'OutputDir=dist'
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $iss | Out-File -FilePath "dist/setup.iss" -Encoding UTF8
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "dist/setup.iss"

      - name: Flatten installer
        shell: pwsh
        run: |
          $setupExe = Get-ChildItem -Recurse dist -Filter "*.exe" | Where-Object { $_.Name -like "*setup*" -or $_.Name -like "*Setup*" } | Select-Object -First 1
          if ($setupExe) {
            Move-Item $setupExe.FullName "dist/Sena-Repo_Windows_v${env:VERSION}_Setup.exe"
            Remove-Item -Recurse -Force dist/0.* -ErrorAction SilentlyContinue
          }

      - name: Package portable zip
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $pkg="Sena-Repo_Windows_v${env:VERSION}"
          $releaseDir = "build/windows/x64/runner/Release"
          robocopy $releaseDir $pkg /E /NFL /NDL /NJH /NJS /nc /ns /np
          if ($LASTEXITCODE -ge 8) { throw "robocopy failed with exit code $LASTEXITCODE" }
          $global:LASTEXITCODE = 0
          if (Test-Path "$pkg/python/python.exe") {
            Write-Host "OK: python/ included in portable package"
          } else {
            Write-Host "WARNING: python/ missing! Package contents:"
            Get-ChildItem $pkg -Directory | Select-Object Name
          }
          Compress-Archive -Path $pkg -DestinationPath "dist/$pkg.zip"
      - name: Upload Windows Portable
        uses: actions/upload-artifact@v4
        with:
          name: Sena-Repo_Windows_Portable
          path: client/dist/Sena-Repo_Windows_*.zip
      - name: Upload Windows Installer
        uses: actions/upload-artifact@v4
        with:
          name: Sena-Repo_Windows_Installer
          path: client/dist/**/*.exe

  # ── Linux ────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Resolve version
        run: |
          V="${{ inputs.version }}"
          if [ -z "$V" ]; then V=$(grep "^version:" pubspec.yaml | head -1 | sed 's/version: *//'); fi
          echo "VERSION=$V" >> "$GITHUB_ENV"
      - name: Sync version into code
        run: |
          sed -i "s/const appVersion = \".*\"/const appVersion = \"${VERSION}\"/" lib/utils/version.dart
          sed -i "s/^version: .*/version: ${VERSION}/" pubspec.yaml
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.29"
          channel: "stable"
      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev zstd file imagemagick libayatana-appindicator3-dev p7zip-full
      - name: Copy 7z binary
        run: |
          mkdir -p assets/binaries
          tar -xf ../7z/Linux/7z2601-linux-x64.tar.xz -C assets/binaries 7zz
      - name: Enable Linux
        run: |
          flutter config --enable-linux-desktop
          flutter create . --project-name sena_repo --org senarepo
          rm -rf android/app/src/main/kotlin/senarepo
          python3 ../.github/scripts/patch_linux_runner_touch.py
      - name: Install dependencies
        run: flutter pub get
      - name: Generate app icons
        run: dart run flutter_launcher_icons
      - name: Build Linux
        run: flutter build linux --release
      - name: Bundle add_steam_game.py + vdf
        run: |
          BUNDLE=build/linux/x64/release/bundle
          cp ../server/add_steam_game.py "$BUNDLE/add_steam_game.py"
          cp -r ../server/vdf "$BUNDLE/vdf"
      - name: Package Linux
        run: |
          BUNDLE=build/linux/x64/release/bundle
          mkdir -p dist
          # AppImage
          APPDIR="SenaRepo.AppDir"
          mkdir -p "$APPDIR" && cp -r "$BUNDLE"/* "$APPDIR/"
          mkdir -p "$APPDIR/usr/share/applications"
          mkdir -p "$APPDIR/usr/share/icons/hicolor/256x256/apps"
          # Generate icon from asset or placeholder
          if [ -f assets/icon.png ]; then
            convert assets/icon.png -resize 256x256 "$APPDIR/sena-repo.png"
          else
            convert -size 256x256 xc:'#7C3AED' -fill white -pointsize 120 -gravity center -annotate 0 "S" "$APPDIR/sena-repo.png"
          fi
          cp "$APPDIR/sena-repo.png" "$APPDIR/usr/share/icons/hicolor/256x256/apps/sena-repo.png"
          cp "$APPDIR/sena-repo.png" "$APPDIR/.DirIcon"
          cat > "$APPDIR/sena-repo.desktop" << 'EOF'
          [Desktop Entry]
          Name=Sena Repo
          Comment=GalGame Private Library Manager
          Exec=sena_repo
          Icon=sena-repo
          Type=Application
          Categories=Utility;
          EOF
          cat > "$APPDIR/AppRun" << 'EOF'
          #!/bin/bash
          HERE="$(dirname "$(readlink -f "$0")")"
          exec "$HERE/sena_repo" "$@"
          EOF
          chmod +x "$APPDIR/AppRun"
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage
          export APPIMAGE_EXTRACT_AND_RUN=1
          ARCH=x86_64 ./appimagetool-x86_64.AppImage "$APPDIR" "dist/Sena-Repo_Linux_v${VERSION}-x86_64.AppImage"
          rm -rf "$APPDIR"
      - name: Upload Linux AppImage
        uses: actions/upload-artifact@v4
        with:
          name: Sena-Repo_Linux
          path: client/dist/Sena-Repo_Linux_*

  # ── Docker Server ────────────────────────────────
  build-server:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4
      - name: Resolve version
        run: |
          V="${{ inputs.version }}"
          if [ -z "$V" ]; then V=$(grep "^version:" client/pubspec.yaml | head -1 | sed 's/version: *//'); fi
          echo "VERSION=$V" >> "$GITHUB_ENV"
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and export AMD64 tarball
        run: |
          docker buildx build --platform linux/amd64 -t sena-repo:amd64 server/ --build-arg SENA_VERSION=${VERSION} --load
          docker save sena-repo:amd64 | gzip > "Sena-Repo_Server_amd64_v${VERSION}.tar.gz"

      - name: Build and export ARM64 tarball
        run: |
          docker buildx build --platform linux/arm64 -t sena-repo:arm64 server/ --build-arg SENA_VERSION=${VERSION} --load
          docker save sena-repo:arm64 | gzip > "Sena-Repo_Server_arm64_v${VERSION}.tar.gz"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push to registries (multi-arch)
        run: |
          DOCKERHUB_NAMESPACE=$(printf '%s' "${{ secrets.DOCKERHUB_USERNAME }}" | tr '[:upper:]' '[:lower:]')
          docker buildx build --platform linux/amd64,linux/arm64 \
            -t ghcr.io/404-gcross/sena-repo:latest \
            -t ghcr.io/404-gcross/sena-repo:v${VERSION} \
            -t docker.io/${DOCKERHUB_NAMESPACE}/sena-repo:latest \
            -t docker.io/${DOCKERHUB_NAMESPACE}/sena-repo:v${VERSION} \
            server/ --build-arg SENA_VERSION=${VERSION} --push

      - name: Upload Server Image (AMD64)
        uses: actions/upload-artifact@v4
        with:
          name: Sena-Repo_Server_amd64
          path: Sena-Repo_Server_amd64_*.tar.gz

      - name: Upload Server Image (ARM64)
        uses: actions/upload-artifact@v4
        with:
          name: Sena-Repo_Server_arm64
          path: Sena-Repo_Server_arm64_*.tar.gz

  # Publish Release
  publish:
    if: github.event_name == 'workflow_dispatch'
    needs: [build-android, build-windows, build-linux, build-server]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Resolve version
        id: version
        working-directory: .
        run: |
          V="${{ inputs.version }}"
          if [ -z "$V" ]; then V=$(grep "^version:" client/pubspec.yaml | head -1 | sed 's/version: *//'); fi
          echo "version=$V" >> "$GITHUB_OUTPUT"
      - name: Validate release tag
        working-directory: .
        run: |
          TAG="v${{ steps.version.outputs.version }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            TAG_SHA=$(git rev-list -n 1 "$TAG")
            if [ "$TAG_SHA" != "$GITHUB_SHA" ]; then
              echo "::error::Tag $TAG already exists at $TAG_SHA, but this run is $GITHUB_SHA. Use a new version or move/delete the old tag."
              exit 1
            fi
          fi
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
      - name: Generate release notes
        working-directory: .
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          MODE="${{ inputs.notes_mode }}"
          TAG="v${{ steps.version.outputs.version }}"
          cat > custom_notes.md <<'CUSTOM_NOTES_EOF'
          ${{ inputs.custom_notes }}
          CUSTOM_NOTES_EOF
          sed -i 's/^          //' custom_notes.md

          git fetch --tags --force --prune

          PREV_TAG=""
          while IFS= read -r candidate; do
            if git rev-parse "$candidate^{commit}" >/dev/null 2>&1 && git merge-base --is-ancestor "$candidate" "$GITHUB_SHA"; then
              PREV_TAG="$candidate"
              break
            fi
          done < <(gh api "repos/${GITHUB_REPOSITORY}/releases" --paginate --jq ".[] | select(.prerelease == false and .tag_name != \"${TAG}\") | .tag_name")

          if [ -n "$PREV_TAG" ]; then
            RANGE="$PREV_TAG..$GITHUB_SHA"
            printf '## Changes (%s -> %s)\n\n' "$PREV_TAG" "$TAG" > release_notes_auto.md
          else
            RANGE="$GITHUB_SHA"
            printf '## Changes (%s)\n\n' "$TAG" > release_notes_auto.md
          fi
          NOTES=$(git log --no-merges --format='- %s (%h)' "$RANGE")
          if [ -n "$NOTES" ]; then
            printf '%s\n' "$NOTES" >> release_notes_auto.md
          else
            printf '%s\n' '- Build artifacts updated.' >> release_notes_auto.md
          fi
          printf '\n## Artifacts\n- Android APK\n- Windows installer and portable zip\n- Linux AppImage\n- Server Docker images and offline image archives\n' >> release_notes_auto.md

          case "$MODE" in
            custom)
              if [ ! -s custom_notes.md ]; then
                echo "::error::custom_notes is required when notes_mode is custom."
                exit 1
              fi
              cp custom_notes.md release_notes.md
              ;;
            auto)
              cp release_notes_auto.md release_notes.md
              ;;
            both|*)
              if [ -s custom_notes.md ]; then
                cat custom_notes.md > release_notes.md
                printf '\n' >> release_notes.md
                cat release_notes_auto.md >> release_notes.md
              else
                cp release_notes_auto.md release_notes.md
              fi
              ;;
          esac
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          prerelease: false
          body_path: release_notes.md
          files: dist/**/*
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Delete pre-releases
        uses: actions/github-script@v7
        with:
          script: |
            const releases = await github.paginate(github.rest.repos.listReleases, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100,
            });

            for (const release of releases) {
              if (!release.prerelease) continue;
              core.info(`Deleting pre-release ${release.tag_name} (${release.id})`);
              await github.rest.repos.deleteRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: release.id,
              });
            }

name: Build 7zz-zstd for Android ARM64

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "7-Zip-zstd git ref/tag"
        required: true
        default: "v26.02-v1.5.7-R2"
  push:
    paths:
      - ".github/workflows/build-7zz-android.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install NDK
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "ndk;27.0.12077973" 2>&1

      - name: Clone 7-Zip-zstd source
        run: |
          REF="${{ github.event.inputs.ref || 'v26.02-v1.5.7-R2' }}"
          git clone --depth 1 --branch "$REF" https://github.com/mcmilk/7-Zip-zstd.git /tmp/7zsrc
          test -d /tmp/7zsrc/CPP/7zip/Bundles/Alone2
          git -C /tmp/7zsrc rev-parse --short HEAD

      - name: Build 7zz-zstd for aarch64
        run: |
          NDK="$ANDROID_HOME/ndk/27.0.12077973/toolchains/llvm/prebuilt/linux-x86_64/bin"
          cd /tmp/7zsrc/CPP/7zip/Bundles/Alone2
          # Remove -lpthread and -ldl (Bionic has them built-in)
          grep -rl '\-lpthread\|\-ldl' /tmp/7zsrc/CPP/7zip/ | xargs -r sed -i 's/-lpthread//g; s/-ldl//g'
          make -j$(nproc) -f makefile.gcc \
            CC="$NDK/aarch64-linux-android29-clang" \
            CXX="$NDK/aarch64-linux-android29-clang++"
          echo "=== Build output ==="
          file _o/7zz
          ls -la _o/7zz
          sha256sum _o/7zz > _o/7zz.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: 7zz-zstd-android-arm64
          path: |
            /tmp/7zsrc/CPP/7zip/Bundles/Alone2/_o/7zz
            /tmp/7zsrc/CPP/7zip/Bundles/Alone2/_o/7zz.sha256

version: "3"
services:
  sena-repo:
    build: .
    image: sena-repo:latest
    container_name: sena-repo
    ports:
      - "11451:11451"
    volumes:
      - /path/to/your/games:/games
      - /path/to/data:/data
    environment:
      - SENA_GAMES_PATH=/games
      - SENA_DATA_PATH=/data
    restart: unless-stopped

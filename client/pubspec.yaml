name: sena_repo
description: Sena Repo - GalGame Private Library Manager Client
publish_to: "none"
version: 0.1.0

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  provider: ^6.1.0
  cached_network_image: ^3.3.0
  file_picker: ^8.0.0
  path_provider: ^2.1.0
  flutter_downloader: ^1.11.0
  shared_preferences: ^2.2.0
  intl: ^0.19.0
  font_awesome_flutter: ^10.8.0
  archive: ^3.6.1
  tray_manager: ^0.5.1
  window_manager:
    git:
      url: https://github.com/bggRGjQaUbCoE/window_manager.git
      ref: main
      path: packages/window_manager

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/binaries/
